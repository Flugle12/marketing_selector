# MarketingSelector — параметры по умолчанию

# Таблица случайных индексов согласованности (RI) по Саати
ri_table:
  1: 0.00
  2: 0.00
  3: 0.58
  4: 0.90
  5: 1.12
  6: 1.24
  7: 1.32
  8: 1.41
  9: 1.45
  10: 1.49

# Порог согласованности: матрица считается согласованной при CR < cr_threshold
cr_threshold: 0.1

# Каналы по умолчанию (используются, если пользователь не указал свои)
default_channels:
  - SEO
  - Контекстная реклама
  - Социальные сети
  - Email-рассылки